{% extends "base.html" %}
{% block title %}seko-ai &middot; settings{% endblock %}
{% block content %}
<section class="space-y-8">
  <div>
    <h1 class="text-2xl font-semibold">Settings</h1>
    <dl class="mt-3 grid max-w-lg grid-cols-3 gap-y-2 text-sm">
      <dt class="text-slate-400">Username</dt><dd class="col-span-2">{{ user.username }}</dd>
      <dt class="text-slate-400">Email</dt><dd class="col-span-2">{{ user.email or "—" }}</dd>
      <dt class="text-slate-400">Role</dt><dd class="col-span-2">{{ "Admin" if user.is_admin else "User" }}</dd>
    </dl>
  </div>
</section>
{% endblock %}
