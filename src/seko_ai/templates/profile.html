{% extends "base.html" %}
{% block title %}seko-ai &middot; profile{% endblock %}
{% block content %}
<section class="space-y-6">
  <h1 class="text-2xl font-semibold">Profile</h1>
  <dl class="grid max-w-lg grid-cols-3 gap-y-3 text-sm">
    <dt class="text-slate-400">Username</dt>
    <dd class="col-span-2">{{ user.username }}</dd>
    <dt class="text-slate-400">Display name</dt>
    <dd class="col-span-2">{{ user.display_name or "—" }}</dd>
    <dt class="text-slate-400">Email</dt>
    <dd class="col-span-2">{{ user.email or "—" }}</dd>
    <dt class="text-slate-400">Role</dt>
    <dd class="col-span-2">{{ "Admin" if user.is_admin else "User" }}</dd>
  </dl>
</section>
{% endblock %}
