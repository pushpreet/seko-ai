<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}seko-ai{% endblock %}</title>
    <!-- Swap HTMX responses even on 4xx/5xx so inline validation/error fragments render. -->
    <meta name="htmx-config" content='{"responseHandling":[{"code":"204","swap":false},{"code":"[23]..","swap":true},{"code":"[45]..","swap":true}]}' />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
      window.copyText = async function (btn) {
        const text = btn.dataset.copy || "";
        if (!text || !navigator.clipboard) return;

        const originalText = btn.textContent;
        const originalTitle = btn.getAttribute("title");
        try {
          await navigator.clipboard.writeText(text);
          btn.textContent = "Copied!";
          btn.setAttribute("title", "Copied!");
          setTimeout(() => {
            btn.textContent = originalText;
            if (originalTitle) {
              btn.setAttribute("title", originalTitle);
            } else {
              btn.removeAttribute("title");
            }
          }, 1200);
        } catch {
          btn.setAttribute("title", "Copy failed");
        }
      };
    </script>
    <script>
      window.copyCode = async function (btn) {
        const sel = btn.dataset.target;
        const el = sel ? document.querySelector(sel) : btn.closest("figure")?.querySelector("pre");
        const text = el ? el.textContent : "";
        if (!text || !navigator.clipboard) return;

        const label = btn.querySelector("[data-copy-label]") || btn;
        const original = label.textContent;
        try {
          await navigator.clipboard.writeText(text);
          label.textContent = "Copied!";
          setTimeout(() => {
            label.textContent = original;
          }, 1200);
        } catch {
          label.textContent = "Copy failed";
          setTimeout(() => {
            label.textContent = original;
          }, 1200);
        }
      };
    </script>
    <script>
      window.selectKitOs = function (os) {
        document.querySelectorAll("[data-os-panel]").forEach((el) => {
          el.classList.toggle("hidden", el.dataset.osPanel !== os);
        });
        document.querySelectorAll("[data-os-tab]").forEach((btn) => {
          const active = btn.dataset.osTab === os;
          btn.classList.toggle("bg-sky-600", active);
          btn.classList.toggle("text-white", active);
          btn.classList.toggle("bg-slate-800", !active);
          btn.classList.toggle("text-slate-300", !active);
        });
      };
    </script>
    <script>
      // Minimal client-side ZIP (STORE / no compression) so the self-host kit can be saved
      // as one file without a server round-trip (the one-time key already lives in the page).
      function _kitCrc32(bytes) {
        let c = 0xffffffff;
        for (let i = 0; i < bytes.length; i++) {
          c = c ^ bytes[i];
          for (let k = 0; k < 8; k++) {
            c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          }
        }
        return (c ^ 0xffffffff) >>> 0;
      }
      function _kitZip(files) {
        const enc = new TextEncoder();
        const u16 = (v) => [v & 0xff, (v >>> 8) & 0xff];
        const u32 = (v) => [v & 0xff, (v >>> 8) & 0xff, (v >>> 16) & 0xff, (v >>> 24) & 0xff];
        const local = [];
        const central = [];
        let offset = 0;
        for (const file of files) {
          const name = enc.encode(file.name);
          const data = enc.encode(file.text);
          const crc = _kitCrc32(data);
          const size = data.length;
          const header = [].concat(
            u32(0x04034b50), u16(20), u16(0), u16(0), u16(0), u16(0),
            u32(crc), u32(size), u32(size), u16(name.length), u16(0)
          );
          local.push(new Uint8Array(header), name, data);
          const cd = [].concat(
            u32(0x02014b50), u16(20), u16(20), u16(0), u16(0), u16(0), u16(0),
            u32(crc), u32(size), u32(size), u16(name.length), u16(0), u16(0),
            u16(0), u16(0), u32(0), u32(offset)
          );
          central.push(new Uint8Array(cd), name);
          offset += header.length + name.length + size;
        }
        const cdStart = offset;
        const cdSize = central.reduce((n, c) => n + c.length, 0);
        const eocd = [].concat(
          u32(0x06054b50), u16(0), u16(0), u16(files.length), u16(files.length),
          u32(cdSize), u32(cdStart), u16(0)
        );
        return new Blob(local.concat(central, [new Uint8Array(eocd)]), { type: "application/zip" });
      }
      window.downloadKit = function (btn) {
        // Collect the visible kit files: .env, docker-compose.yml, and the installer in the
        // currently-selected OS panel (hidden panels use display:none -> offsetParent null).
        const files = Array.from(document.querySelectorAll("[data-kit-file]"))
          .filter((fig) => fig.offsetParent !== null)
          .map((fig) => {
            const pre = fig.querySelector("pre");
            return { name: fig.dataset.kitFile, text: pre ? pre.textContent : "" };
          })
          .filter((f) => f.name && f.text);
        if (!files.length) return;
        const url = URL.createObjectURL(_kitZip(files));
        const a = document.createElement("a");
        a.href = url;
        a.download = "seko-workspace-kit.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
        const original = btn.textContent;
        btn.textContent = "Downloaded!";
        setTimeout(() => {
          btn.textContent = original;
        }, 1200);
      };
    </script>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body class="h-full text-slate-100">
    <header class="border-b border-slate-800 bg-slate-900/60">
      <nav class="mx-auto flex max-w-5xl items-center justify-between px-4 py-3">
        <a href="/" class="text-lg font-semibold tracking-tight">seko&#8209;ai</a>
        <div class="flex items-center gap-4 text-sm">
          {% if user %}
            <a href="/keys" class="hover:text-sky-400">API Keys</a>
            <a href="/workspaces" class="hover:text-sky-400">Workspaces</a>
            <a href="/backups" class="hover:text-sky-400">Backups</a>
            <a href="/selfhost" class="hover:text-sky-400">Self-host</a>
            <a href="/usage" class="hover:text-sky-400">Usage</a>
            <a href="/docs" class="hover:text-sky-400">Docs</a>
            <a href="/profile" class="text-slate-400 hover:text-sky-400">{{ user.display_name or user.username }}</a>
            <a href="/auth/logout" class="rounded bg-slate-800 px-3 py-1 hover:bg-slate-700">Sign out</a>
          {% else %}
            <a href="/auth/login" class="rounded bg-sky-600 px-3 py-1 font-medium hover:bg-sky-500">Sign in</a>
          {% endif %}
        </div>
      </nav>
    </header>
    <main class="mx-auto max-w-5xl px-4 py-8">
      {% block content %}{% endblock %}
    </main>
    <footer class="mx-auto max-w-5xl px-4 py-6 text-xs text-slate-500">
      seko-ai v{{ version }} &middot; local LLM control plane
    </footer>
  </body>
</html>
