{% extends "base.html" %}
{% block title %}seko-ai &middot; API keys{% endblock %}
{% block content %}
<section class="space-y-6">
  <div>
    <h1 class="text-2xl font-semibold">API Keys</h1>
    <p class="mt-1 text-sm text-slate-400">
      Use a key with any OpenAI-compatible client against the shared LLM backend.
    </p>
  </div>

  <div class="rounded-lg border border-slate-800 bg-slate-900/50 p-4 text-sm">
    <div class="grid grid-cols-3 gap-y-2">
      <span class="text-slate-400">Endpoint</span>
      <div class="col-span-2 flex flex-wrap items-center gap-2">
        <code class="select-all text-sky-300">{{ endpoint }}</code>
        <button class="rounded bg-slate-800 px-2 py-1 text-xs hover:bg-slate-700" type="button" title="Copy API endpoint" data-copy="{{ endpoint }}" onclick="copyText(this)">Copy</button>
      </div>
      <span class="text-slate-400">Model</span>
      <div class="col-span-2 flex flex-wrap items-center gap-2">
        <code class="select-all text-sky-300">{{ model }}</code>
        <button class="rounded bg-slate-800 px-2 py-1 text-xs hover:bg-slate-700" type="button" title="Copy model" data-copy="{{ model }}" onclick="copyText(this)">Copy</button>
      </div>
    </div>
  </div>

  <div id="keys-panel">
    {% include "_keys_panel.html" %}
  </div>
</section>
{% endblock %}
